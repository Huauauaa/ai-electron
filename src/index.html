<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON 格式化</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #1f2430;
        color: #e6e6e6;
      }
      .container {
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding: 16px;
        box-sizing: border-box;
        gap: 12px;
      }
      h1 {
        margin: 0;
        font-size: 20px;
      }
      .toolbar {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      button {
        border: none;
        background: #4f7cff;
        color: white;
        border-radius: 6px;
        padding: 8px 12px;
        cursor: pointer;
      }
      button.secondary {
        background: #3d4250;
      }
      button:hover {
        opacity: 0.9;
      }
      .toolbar label {
        font-size: 13px;
        color: #c9d1e2;
      }
      select {
        border: 1px solid #3f4659;
        background: #2a3040;
        color: #f0f0f0;
        border-radius: 6px;
        padding: 7px 10px;
      }
      .editor-wrap {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        flex: 1;
        min-height: 0;
      }
      textarea {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        background: #2a3040;
        color: #f0f0f0;
        border: 1px solid #3f4659;
        border-radius: 8px;
        resize: none;
        padding: 12px;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        font-size: 13px;
        line-height: 1.5;
      }
      .status {
        min-height: 20px;
        font-size: 13px;
        color: #ffd166;
      }
      .status.ok {
        color: #73e2a7;
      }
      @media (max-width: 900px) {
        .editor-wrap {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>JSON 格式化</h1>
      <div class="toolbar">
        <button id="format-btn">格式化</button>
        <button id="minify-btn">压缩</button>
        <button id="copy-btn" class="secondary">复制结果</button>
        <button id="clear-btn" class="secondary">清空</button>
        <button id="sample-btn" class="secondary">示例</button>
        <label for="indent">缩进</label>
        <select id="indent">
          <option value="2">2 空格</option>
          <option value="4">4 空格</option>
          <option value="8">8 空格</option>
        </select>
      </div>
      <div class="editor-wrap">
        <textarea
          id="input"
          placeholder="在这里粘贴 JSON..."
          spellcheck="false"
        ></textarea>
        <textarea
          id="output"
          placeholder="格式化结果会显示在这里..."
          spellcheck="false"
          readonly
        ></textarea>
      </div>
      <div id="status" class="status"></div>
    </div>
    <script src="../dist/renderer.js"></script>
  </body>
</html>
