<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开发工具箱</title>
    <link rel="stylesheet" href="app.css" />
    <link rel="stylesheet" href="tools/json/json.css" />
    <link rel="stylesheet" href="tools/cron/cron.css" />
    <link rel="stylesheet" href="tools/jar/jar.css" />
  </head>
  <body>
    <div class="container">
      <h1>开发工具箱</h1>
      <div class="tabs">
        <button id="tab-json" class="tab-btn active">JSON</button>
        <button id="tab-cron" class="tab-btn">Cron</button>
        <button id="tab-jar" class="tab-btn">JAR 运行</button>
      </div>
      <div id="panel-json" class="panel active">
        <div class="toolbar">
          <button id="format-btn">格式化</button>
          <button id="minify-btn">压缩</button>
          <button id="copy-btn" class="secondary">复制结果</button>
          <button id="clear-btn" class="secondary">清空</button>
          <button id="sample-btn" class="secondary">示例</button>
          <label for="indent">缩进</label>
          <select id="indent">
            <option value="2">2 空格</option>
            <option value="4">4 空格</option>
            <option value="8">8 空格</option>
          </select>
        </div>
        <div class="editor-wrap">
          <textarea
            id="input"
            placeholder="在这里粘贴 JSON..."
            spellcheck="false"
          ></textarea>
          <textarea
            id="output"
            placeholder="格式化结果会显示在这里..."
            spellcheck="false"
            readonly
          ></textarea>
        </div>
        <div id="status-json" class="status"></div>
      </div>
      <div id="panel-cron" class="panel">
        <div class="toolbar">
          <input
            id="cron-expression"
            type="text"
            placeholder="输入 cron 表达式，例如: */15 9-18 * * 1-5"
            spellcheck="false"
          />
          <button id="cron-validate-btn">校验</button>
          <button id="cron-preview-btn">未来 5 次</button>
          <button id="cron-sample-btn" class="secondary">示例</button>
          <button id="cron-clear-btn" class="secondary">清空</button>
        </div>
        <div class="cron-grid">
          <div class="cron-field">
            <label for="cron-minute">分钟 (0-59)</label>
            <input id="cron-minute" type="text" value="*" spellcheck="false" />
          </div>
          <div class="cron-field">
            <label for="cron-hour">小时 (0-23)</label>
            <input id="cron-hour" type="text" value="*" spellcheck="false" />
          </div>
          <div class="cron-field">
            <label for="cron-day-of-month">日期 (1-31)</label>
            <input
              id="cron-day-of-month"
              type="text"
              value="*"
              spellcheck="false"
            />
          </div>
          <div class="cron-field">
            <label for="cron-month">月份 (1-12)</label>
            <input id="cron-month" type="text" value="*" spellcheck="false" />
          </div>
          <div class="cron-field">
            <label for="cron-day-of-week">星期 (0-7, 0/7=周日)</label>
            <input
              id="cron-day-of-week"
              type="text"
              value="*"
              spellcheck="false"
            />
          </div>
        </div>
        <div class="toolbar">
          <button id="cron-build-btn">从字段生成表达式</button>
        </div>
        <div class="editor-wrap">
          <textarea
            id="cron-output"
            placeholder="解析说明与未来执行时间会显示在这里..."
            spellcheck="false"
            readonly
          ></textarea>
          <textarea
            id="cron-notes"
            placeholder="说明：支持标准 5 段 cron（分 时 日 月 周），支持 *, 范围(-), 列表(,), 步长(/)。"
            spellcheck="false"
            readonly
          >说明：
- 支持标准 5 段 cron：分 时 日 月 周
- 支持通配符 *、范围 a-b、列表 a,b,c、步长 */n 或 a-b/n
- 星期字段支持 0-7（0 和 7 都表示周日）</textarea>
        </div>
        <div id="status-cron" class="status"></div>
      </div>
      <div id="panel-jar" class="panel">
        <div class="jar-fields">
          <div class="jar-field">
            <label for="jar-path">JAR 路径（本地绝对或相对路径）</label>
            <input
              id="jar-path"
              type="text"
              placeholder="/path/to/app.jar"
              spellcheck="false"
            />
          </div>
          <div class="jar-field">
            <label for="jar-java">Java 可执行文件（可选，默认在 PATH 中查找 java）</label>
            <input
              id="jar-java"
              type="text"
              placeholder="java 或 /Library/Java/JavaVirtualMachines/.../bin/java"
              spellcheck="false"
            />
          </div>
          <div class="jar-field">
            <label for="jar-cwd">工作目录（可选）</label>
            <input id="jar-cwd" type="text" placeholder="留空则使用应用启动目录" spellcheck="false" />
          </div>
          <div class="jar-field">
            <label for="jar-jvm-args">JVM 参数（可选，每行一个）</label>
            <textarea
              id="jar-jvm-args"
              rows="3"
              placeholder="-Xmx512m&#10;-Dfile.encoding=UTF-8"
              spellcheck="false"
            ></textarea>
            <div class="hint">会按顺序插入在「java」与「-jar」之间，例如内存、系统属性等。</div>
          </div>
          <div class="jar-field">
            <label for="jar-program-args">程序参数（每行一个）</label>
            <textarea
              id="jar-program-args"
              rows="4"
              placeholder="--help&#10;input.txt"
              spellcheck="false"
            ></textarea>
            <div class="hint">对应命令行中 jar 文件名之后的参数；含空格的值请单独占一行。</div>
          </div>
          <div class="jar-field">
            <label for="jar-timeout">超时（秒，可选）</label>
            <input
              id="jar-timeout"
              type="text"
              inputmode="numeric"
              placeholder="留空表示不限制"
              spellcheck="false"
            />
          </div>
        </div>
        <div class="toolbar">
          <button id="jar-run-btn">运行</button>
          <button id="jar-clear-btn" class="secondary">清空表单</button>
        </div>
        <div class="jar-output-wrap">
          <label for="jar-output" style="font-size: 12px; color: #c9d1e2">执行输出</label>
          <textarea
            id="jar-output"
            placeholder="运行结果（stdout / stderr）会显示在这里..."
            spellcheck="false"
            readonly
          ></textarea>
        </div>
        <div id="status-jar" class="status"></div>
      </div>
    </div>
    <script type="module" src="../dist/renderer.js"></script>
  </body>
</html>
