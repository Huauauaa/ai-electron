name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist -- --win --x64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64-release-assets
          path: dist/*.exe
          if-no-files-found: error

  build-macos-universal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      
      # Build universal binary (works on both Intel and Apple Silicon)
      - name: Build macOS universal app
        run: npm run dist -- --mac --universal --publish never
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-universal-release-assets
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  release:
    needs: [build-windows, build-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/*.exe
            release-assets/*.dmg
            release-assets/*.zip
          fail_on_unmatched_files: true
